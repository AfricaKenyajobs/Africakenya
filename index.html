<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africakenya | Jobs & Safety</title>
    <style>
        :root { --green: #006400; --yellow: #ffcc00; --red: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; line-height: 1.6; }
        header { background: var(--green); color: white; padding: 2rem 1rem; text-align: center; border-bottom: 5px solid var(--yellow); }
        .safety-bar { background: var(--red); color: white; padding: 10px; text-align: center; font-weight: bold; }
        .container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .card { background: white; padding: 1.5rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--green); margin-bottom: 20px; }
        footer { text-align: center; padding: 2rem; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="safety-bar">⚠️ NEVER PAY FOR A JOB. IF THEY ASK FOR MONEY, IT'S A SCAM!</div>

<header>
    <h1>🌍 Africakenya</h1>
    <p>Connecting Kenyans to Safe Global & Local Opportunities</p>
</header>

<div class="container">
    <div class="card">
        <h3>🔥 Fresh Jobs This Week</h3>
        <p><small>Updated automatically</small></p>
        <ul style="list-style-type: none; padding: 0;">
<li>Searching for new jobs...</li>
</ul>
    </div>
</div>

<footer>
    <p>&copy; 2026 Africakenya - Helping Kenyans Find Work Safely</p>
</footer>

</body>
</html>
